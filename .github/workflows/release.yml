name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('Cargo.lock') }}

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libssl-dev pkg-config build-essential file

      - run: npm ci

      - name: Build iperf3 (static Linux)
        env:
          IPERF_VER: "3.21"
        run: |
          set -e
          curl -fsSL "https://github.com/esnet/iperf/releases/download/${IPERF_VER}/iperf-${IPERF_VER}.tar.gz" -o /tmp/iperf.tar.gz
          mkdir -p /tmp/iperf-build
          tar xzf /tmp/iperf.tar.gz -C /tmp/iperf-build --strip-components=1
          cd /tmp/iperf-build
          ./configure --enable-static-bin --disable-shared LDFLAGS="-static"
          make -j"$(nproc)"
          strip src/iperf3
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources/linux"
          cp src/iperf3 "$GITHUB_WORKSPACE/src-tauri/resources/linux/iperf3"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/resources/linux/iperf3"

      - name: Tauri build
        env:
          NO_STRIP: "true"
        run: npx tauri build --bundles deb

      - name: Collect artifact
        id: artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DEB=$(find target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "lanprobe_${TAG}_amd64.deb"
          echo "deb=lanprobe_${TAG}_amd64.deb" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ steps.artifacts.outputs.deb }}

  build-linux-server:
    name: Build Linux headless server (.deb)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-server-cargo-${{ hashFiles('Cargo.lock') }}

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build -p lanprobe-server --release

      - name: Build .deb
        run: cargo deb -p lanprobe-server --no-build

      - name: Collect artifact
        id: artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DEB=$(find target/debian -name "lanprobe-server*.deb" | head -1)
          DEST="lanprobe-server_${TAG}_amd64.deb"
          cp "$DEB" "$DEST"
          echo "deb=$DEST" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-server
          path: ${{ steps.artifacts.outputs.deb }}

  build-windows:
    name: Build Windows (NSIS .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}

      - run: npm ci

      - name: Tauri build
        run: npx tauri build

      - name: Collect artifact
        id: artifacts
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NSIS=$(find target/release/bundle/nsis -name "*-setup.exe" | head -1)
          DEST="lanprobe_${TAG}_x64-setup.exe"
          cp "$NSIS" "$DEST"
          echo "exe=$DEST" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ steps.artifacts.outputs.exe }}

  build-macos:
    name: Build macOS universal DMG + PKG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('Cargo.lock') }}

      - run: npm ci

      - name: Build iperf3 (universal macOS)
        env:
          IPERF_VER: "3.21"
        run: |
          set -e
          curl -fsSL "https://github.com/esnet/iperf/releases/download/${IPERF_VER}/iperf-${IPERF_VER}.tar.gz" -o /tmp/iperf.tar.gz
          mkdir -p /tmp/iperf-build
          tar xzf /tmp/iperf.tar.gz -C /tmp/iperf-build --strip-components=1
          cd /tmp/iperf-build
          ./configure --disable-shared \
            CFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=10.13" \
            LDFLAGS="-arch x86_64 -arch arm64 -mmacosx-version-min=10.13"
          make -j"$(sysctl -n hw.ncpu)"
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources/macos"
          cp src/iperf3 "$GITHUB_WORKSPACE/src-tauri/resources/macos/iperf3"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/resources/macos/iperf3"

      - name: Import Apple signing certificates
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -A
          rm /tmp/cert.p12
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k "$KEYCHAIN" -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -A
          rm /tmp/installer.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign:,productbuild:,pkgbuild: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"

      - name: Codesign iperf3
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp \
            "$GITHUB_WORKSPACE/src-tauri/resources/macos/iperf3"

      - name: Build & sign Tauri app + DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target universal-apple-darwin --bundles app,dmg --verbose

      - name: Build signed .pkg
        id: pkg
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          APP_PATH=$(ls -d target/universal-apple-darwin/release/bundle/macos/*.app | head -1)
          INSTALLER_ID=$(security find-identity -v | grep "Developer ID Installer" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          SCRIPTS_DIR="$GITHUB_WORKSPACE/src-tauri/scripts/macos/pkg-scripts"
          chmod 755 "$SCRIPTS_DIR/postinstall"
          PKG_ROOT=$(mktemp -d)
          cp -R "$APP_PATH" "$PKG_ROOT/"
          SIGNED_PKG="lanprobe_${TAG}_universal.pkg"
          COMPONENT_PLIST="$(mktemp).plist"
          pkgbuild --analyze --root "$PKG_ROOT" "$COMPONENT_PLIST"
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" "$COMPONENT_PLIST"
          pkgbuild \
            --root "$PKG_ROOT" \
            --component-plist "$COMPONENT_PLIST" \
            --install-location /Applications \
            --scripts "$SCRIPTS_DIR" \
            --identifier io.lanprobe.app.pkg \
            --version "${TAG#v}" \
            --sign "$INSTALLER_ID" \
            "$SIGNED_PKG"
          rm -rf "$PKG_ROOT" "$COMPONENT_PLIST"
          echo "pkg=$SIGNED_PKG" >> "$GITHUB_OUTPUT"

      - name: Notarize .pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$PKG"

      - name: Collect artifacts
        id: artifacts
        env:
          TAG: ${{ github.ref_name }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          DMG_ORIG=$(ls target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          DMG_DEST="lanprobe_${TAG}_universal.dmg"
          cp "$DMG_ORIG" "$DMG_DEST"
          shasum -a 256 "$DMG_DEST" > "${DMG_DEST}.sha256"
          shasum -a 256 "$PKG"      > "${PKG}.sha256"
          echo "dmg=$DMG_DEST" >> "$GITHUB_OUTPUT"
          echo "dmg_sha=${DMG_DEST}.sha256" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "pkg_sha=${PKG}.sha256" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.dmg_sha }}
            ${{ steps.artifacts.outputs.pkg }}
            ${{ steps.artifacts.outputs.pkg_sha }}

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-linux-server, build-windows, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
